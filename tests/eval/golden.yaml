# Golden set: M3 retrieval queries (`queries`) + M5 structural patterns
# (`structural_patterns`) — expanded architecture doc §6.2 / §3.8.
#
# Corpus: this repository (noesis), self-indexed from the repo root — the
# same corpus the M2 live verification used. All `path` values are relative
# to the repo root.
#
# Labeling rules used by the drafting pass:
#   - Every `path` was verified to exist; every symbol query term was
#     verified present in its labeled file via grep, definition site first.
#   - `lines` is optional and generous (whole function/class); a result hit
#     counts on file match, plus span overlap when `lines` is present.
#   - 1-3 relevant items per query; code files only, never docs.
#   - Categories: nl (natural-language intent, no identifiers), symbol
#     (verbatim identifier lookups — the BM25 channel's reason to exist),
#     structural (structure-phrased, retrieval-evaluated in M3; exact-match
#     evaluation of structural_search arrives with M5).
#
# STAKEHOLDER REVIEW: this set is a draft labeled by the build agent and is
# reviewed/corrected in PR review — the stakeholder's labels are
# authoritative (M3 prompt: "I will label 40 queries").
#
# 40 queries: 14 nl, 14 symbol, 12 structural.
#
# `structural_patterns` (M5, §3.8) is evaluated separately from the
# retrieval metrics: each pattern runs through structural_search against
# this repo (scoped to src/ so agent-tooling churn under .claude/ cannot
# flake the set) and must return EXACTLY the labeled per-file match counts.
# Counts, not line numbers, are pinned: ordinary edits move lines, but a
# match-count change means the code or the matcher changed — either way a
# human should look. Every entry was verified by running the pattern at
# labeling time. Same stakeholder-review rule as above.

