# ------------------------------------------------------- structural (M5)
# Evaluated by tests/eval/test_structural_golden.py: exact per-file match
# counts via structural_search, scoped to paths: ["src"].
structural_patterns:
  - id: sp-01
    pattern: "SgRoot($$$ARGS)"
    language: python
    expected:
      src/noesis/core/structural.py: 2

  - id: sp-02
    pattern: "sqlite3.connect($$$ARGS)"
    language: python
    expected:
      src/noesis/core/state.py: 1

  - id: sp-03
    pattern: "conn.executescript($S)"
    language: python
    expected:
      src/noesis/core/state.py: 1

  - id: sp-04
    pattern: "def detect_language($$$P) -> $RET: $$$B"
    language: python
    expected:
      src/noesis/core/languages.py: 1

  - id: sp-05
    pattern: "GitIgnoreSpec.from_lines($X)"
    language: python
    expected:
      # ADR-42 added the extra-ignore-globs spec build in discovery.
      src/noesis/core/discovery.py: 4
      # M8: the watcher reloads the root .gitignore spec on change.
      src/noesis/core/watcher.py: 1

  - id: sp-06
    pattern: "HTTPException($$$ARGS)"
    language: python
    expected:
      # 7 since M6: status/reindex endpoints added 404 + 404/409 raises.
      src/noesis/api/routes.py: 7
      # M8 dashboard adapter + ADR-42 register/browse/preview + ADR-43 delete.
      src/noesis/api/dashboard.py: 10
      # L5: the localhost-CSRF guard raises one 403.
      src/noesis/api/security.py: 1

  - id: sp-07
    pattern: "time.monotonic()"
    language: python
    expected:
      src/noesis/core/structural.py: 2
      # M8: live progress clock (jobs) + debounce/quiet clocks (watcher).
      src/noesis/core/jobs.py: 2
      # H3 added the re-arm clock in _launch_scoped, bringing watcher to 3.
      src/noesis/core/watcher.py: 3

  - id: sp-08
    pattern: "$LOOP.run_in_executor($$$ARGS)"
    language: python
    expected:
      src/noesis/core/structural.py: 1
      # ADR-42: preview runs discovery in an executor to keep the loop free.
      src/noesis/core/dashboard.py: 1

  - id: sp-09
    pattern: "uuid.uuid4()"
    language: python
    expected:
      src/noesis/core/state.py: 3
