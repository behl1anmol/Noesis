name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # M2 exit criterion: no sentence_transformers outside core/embedder.py,
      # no HTTP clients in core/, no 0.0.0.0 (CLAUDE.md rules 1-2).
      - run: bash .claude/scripts/ci_greps.sh

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      # Default suite: FakeEmbedder + in-memory Qdrant. Since M3, upserts
      # exercise the real BM25 sparse path, so the first run fetches the
      # ~100 KB Qdrant/bm25 tokenizer assets (ADR-32) — no model weights.
      # The integration/golden real-model tests are deliberately not in CI.
      - run: uv run pytest -q
