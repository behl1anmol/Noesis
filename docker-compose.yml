# Qdrant — the only container this project runs (Overview §4.6).
# Server >=1.15.2 required for native BM25 in M3 (expanded doc §2 tech stack);
# pinned minor, not `latest`, so an M3 feature can't silently depend on an
# unreviewed server upgrade.
services:
  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: noesis-qdrant
    ports:
      - "127.0.0.1:6333:6333" # REST — localhost only (CLAUDE.md rule 2)
      - "127.0.0.1:6334:6334" # gRPC — localhost only
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
